name: Publish static site to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Prepare static site
        run: |
          mkdir _site
          cp -R \
            index.html \
            styles.css \
            app.js \
            manifest.webmanifest \
            sw.js \
            privacy.html \
            support.html \
            terms.html \
            publishing.html \
            404.html \
            robots.txt \
            _headers \
            .nojekyll \
            assets \
            store \
            _site/
      - name: Upload static files
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
